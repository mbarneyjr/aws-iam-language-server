---
includes:
  - aws:PrincipalArn
  - aws:PrincipalAccount
  - aws:PrincipalOrgID
excludes:
  - aws:SourceIp
  - aws:TagKeys
  - s3:ResourceAccount
---
Version: '2012-10-17'
Statement:
  - Effect: Allow
    Action:
      - s3:GetObject
    Resource: "*"
    Condition:
      StringEquals:
        aws:P$0
