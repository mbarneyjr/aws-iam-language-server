name: scrape

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH: scrape/update-aws-data
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - run: npm ci
        working-directory: scraper
      - run: npm run scraper
      - name: open pr
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -z "$(git status --porcelain src/data)" ]; then
            echo 'no changes to scraped data'
            exit 0
          fi
          git switch -c "$BRANCH"
          git add src/data
          git commit -m 'chore(data): update scraped AWS IAM data'
          git push origin "$BRANCH"
          if gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo 'pr already open'
          else
            gh pr create \
              --base "$GITHUB_REF_NAME" \
              --head "$BRANCH" \
              --title 'chore(data): update scraped AWS IAM data' \
              --body 'Automated update of scraped AWS IAM reference data. Generated by the scrape workflow. Merging this PR will trigger a patch release.'
          fi
