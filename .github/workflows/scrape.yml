name: scrape

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH: scrape/update-aws-data
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: install nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm ci
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
      - name: open pr
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -z "$(git status --porcelain src/data)" ]; then
            echo 'no changes to scraped data'
            exit 0
          fi
          NEW_VERSION="$(npm version patch --no-git-tag-version)"
          NEW_HASH="$(nix run nixpkgs#prefetch-npm-deps -- package-lock.json)"
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$NEW_HASH\"|" nix/npm.nix nix/vscode.nix
          git switch -c "$BRANCH"
          git add src/data package.json package-lock.json nix/npm.nix nix/vscode.nix
          git commit -m "chore(data): update scraped AWS IAM data ($NEW_VERSION)"
          git push origin "$BRANCH"
          if gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo 'pr already open'
          else
            gh pr create \
              --base "$GITHUB_REF_NAME" \
              --head "$BRANCH" \
              --title "chore(data): update scraped AWS IAM data ($NEW_VERSION)" \
              --body "Automated update of scraped AWS IAM reference data, version bump to $NEW_VERSION, and refreshed nix npmDepsHash. Generated by the scrape workflow. Merging will create release $NEW_VERSION."
          fi
