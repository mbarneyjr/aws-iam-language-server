name: scrape-release

on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'

permissions:
  contents: write

concurrency:
  group: scrape-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: create release
        run: |
          set -euo pipefail
          VERSION="v$(node -p 'require("./package.json").version')"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "release $VERSION already exists"
            exit 0
          fi
          gh release create "$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes

  publish:
    needs: release
    uses: ./.github/workflows/publish.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit
